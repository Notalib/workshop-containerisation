services:
  ubuntu-debugger:
    build: ./ubuntu-debugger # Folder containing the Dockerfile, also known as the build context
    image: ghcr.io/notalib/workshop-containerisation/ubuntu-debugger # The name of the image to be built, in the format <repository>/<image-name>:<tag>

  dotnet-app:
    build: ./dotnet-hello-world
    image: ghcr.io/notalib/workshop-containerisation/dotnet-hello-world
    environment:
      - DOTNET_ENVIRONMENT=Production

  java-app:
    build:
      context: ./java-hello-world
      dockerfile: Dockerfile.good
    image: ghcr.io/notalib/workshop-containerisation/java-hello-world

  static-web-app:
    hostname: static-web-app
    build:
      context: ./static-web-app
      dockerfile: Dockerfile # Replace with Dockerfile.slim if you want to use the smaller image
    image: ghcr.io/notalib/workshop-containerisation/static-web-app
    ports:
      - "127.0.0.1:8080:80"

  # This is an advanced example to demo multi-platform image builds.
  # x-bake props are hints used by "docker buildx bake" and the GitHub Actions pipeline.
  micro-go-app:
    build:
      context: ./micro-go-app
      x-bake:
        platforms:
          - "linux/amd64"
          - "linux/arm64"
        cache-from:
          - type=gha
        cache-to:
          - type=gha,mode=max
        output:
          - type=registry
    image: ghcr.io/notalib/workshop-containerisation/micro-go-app
